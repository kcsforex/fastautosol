version: "3.9"

services:
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: n8n-postgres
    restart: unless-stopped
    command: postgres -c max_connections=100 -c shared_buffers=512MB -c effective_cache_size=1GB -c work_mem=16MB
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      TZ: ${TZ:-Europe/Berlin}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      n8n-shared-net:
        aliases:
          - postgresql

  mcp-postgres:
    image: crystaldba/postgres-mcp:latest
    container_name: mcp-postgres
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy  
    environment:
      DATABASE_URI: postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgresql:5432/${POSTGRES_DB:-n8n}  
    command: >
      --transport=sse
      --access-mode=restricted
      --sse-host=0.0.0.0
      --sse-port=8000 
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 1GB
          cpus: '0.5' 
    networks:
      - n8n-shared-net
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.20.6
    container_name: n8n
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    expose:
      - "5678"
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://${SERVICE_FQDN_N8N}
      WEBHOOK_URL: https://${SERVICE_FQDN_N8N}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Berlin}
      TZ: ${TZ:-Europe/Berlin}
      N8N_MIGRATE_FS_STORAGE_PATH: "true"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgresql
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_SCHEMA: public
      DB_POSTGRESDB_USER: ${SERVICE_USER_POSTGRES}
      DB_POSTGRESDB_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_PRUNE: true
      EXECUTIONS_DATA_MAX_AGE: 72
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 1000

    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: '1.0'
    networks:
      - n8n-shared-net

  crawl4ai:
    image: unclecode/crawl4ai:0.8.0
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: 2g
    expose:
      - "11235"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-}
    networks:
      - n8n-shared-net

  python-dash-app:
    build:
      context: .
      dockerfile: Dockerfile.dash
    container_name: python-dash-app
    restart: always
    depends_on:
      postgresql:
        condition: service_healthy
    expose:
    - "8000"
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-n8n}
      DB_USER: ${SERVICE_USER_POSTGRES}
      DB_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-Europe/Berlin}
      CRAWL4AI_URL: http://crawl4ai:11235
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
    networks:
      - n8n-shared-net

  crypto-webhook-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: crypto-webhook-bot
    restart: always
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      N8N_WEBHOOK_URL: https://${SERVICE_FQDN_N8N}/webhook/crypto-alert
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-Europe/Berlin}
    command: ["python", "crypto-bot.py"]
    deploy:
      resources:
        limits:
          memory: 0.5G
          cpus: '0.5'
    networks:
      - n8n-shared-net

  xstock-webhook-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: xstock-webhook-bot
    restart: always
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      N8N_WEBHOOK_URL: https://${SERVICE_FQDN_N8N}/webhook/xstock-alert
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-Europe/Berlin}
    command: ["python", "xstock-bot.py"]
    deploy:
      resources:
        limits:
          memory: 0.5G
          cpus: '0.5'
    networks:
      - n8n-shared-net

volumes:
  n8n-data:
    driver: local
  postgresql-data:
    driver: local

networks:
  n8n-shared-net:
    driver: bridge
